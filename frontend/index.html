    <title>SIWES LogChain</title>
    <script>
      // Register the network-first service worker ourselves. The version query
      // sidesteps Pxxl's edge cache: the bare /sw.v2.js path was poisoned with
      // an HTML SPA fallback that Cloudflare pinned as immutable, but Cloudflare
      // keys by query string so /sw.v2.js?v=1 serves the real worker file. Bump
      // the version only if the worker logic itself changes. This script lives
      // in index.html, which Pxxl always serves fresh, so it reaches every
      // browser even though standalone .js files are frozen at the edge.
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker
            .register('/sw.v2.js?v=1', { scope: '/' })
            .catch(function () {
              /* no worker is fine, the app works fully online without it */
            })
        })
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
